bind 0.0.0.0
port 6379

# Auth required; must match REDIS_PASSWORD in .env
requirepass REDIS_PASSWORD_PLACEHOLDER

loglevel notice

# Persistence
dir /data
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000

# Memory
maxmemory 300mb
maxmemory-policy allkeys-lru

# Connection
timeout 0
# Faster dead-connection detection for persistent consumer pools
tcp-keepalive 60

# Process
daemonize no
supervised no

# Protected mode off is acceptable only because requirepass is set above.
# If requirepass is ever removed, flip this back to yes.
protected-mode no
