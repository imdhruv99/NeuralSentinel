services:
  mlflow:
    image: ${MLFLOW_IMAGE}
    container_name: mlflow
    hostname: mlflow
    ports:
      - "${MLFLOW_HOST_PORT}:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD_ENCODED}@postgres:5432/${MLFLOW_DB}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT}
      MLFLOW_HOST: 0.0.0.0
      MLFLOW_PORT: 5000
    command: >
      sh -c "pip install psycopg2-binary --quiet &&
      mlflow db upgrade postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD_ENCODED}@postgres:5432/${MLFLOW_DB} &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --allowed-hosts '*'
      --cors-allowed-origins '*'
      --serve-artifacts"
    volumes:
      - ./data/mlflow/artifacts:${MLFLOW_ARTIFACT_ROOT}
    networks:
      - neuralsentinel-network
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: ${MLFLOW_MEM_LIMIT}
    mem_reservation: ${MLFLOW_MEM_RESERVATION}
    cpus: ${MLFLOW_CPU_LIMIT}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
