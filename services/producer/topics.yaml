# =========================================================================================
# Kafka topics configurations and definitions.
# topic_admin.py reads the file and reconciles actual
# cluster state against the desired state defined here.

# Partition Strategy:
#   Partitions set the ceiling on parallelism for the topic.
#   Each topic is the logical stream of events for a given purpose.
#   Each partition is a physical log that can be read independently by a consumer.
#   We can't reduce the number of partitions after a topic is created,
#   we can not reduce them later without deleting the topic and losing all data.
#   So I have set a high number of partitions to allow for future growth and parallelism.
#   Increasing is possible but messy.

# Replication factor: 2 (not 3):
#   I have exactly 2 brokers in the cluster. So replication factor of 3 is not possible.
#   RF=2 is the maximum I can do and gives me fault tolerance for a single broker failure.
#   If when a 3rd broker is added, bump this to 3.

#   Note: min.insync.replicas should be RF-1 = 1, so a single broker can
#   still accept writes if one broker is down. With RF=2 and min_insync=2
#   you'd lose write availability on any broker failure.
# =========================================================================================

topics:
  - name: events.raw
    description: "Raw events collected from various datasets and sources."
    partitions: 6
    replication_factor: 2
    config:

      # How long to retain messages in the topic before they are deleted.
      # 72h covers replay + buffer without filling the broker disk.
      # For production tune this value based on reprocessing SLA and disk capacity.
      retention.ms: "259200000" # 72 hours in milliseconds

      # Maximum message size.
      # EventEnvelope with SMD's 38 metrics serializes to < 2KB. So 1 MB is very conservative headroom.
      max.message.bytes: "1048576"

      # log.cleanup.policy = delete - old arguments are dropped by age.
      # The alternative is "compact", which keeps only the latest  value per key.
      # I want full history for LSTM sequences, so delete is correct here.
      cleanup.policy: "delete"

  - name: events.scored
    description: "Events that have been scored by the scorer."
    partitions: 6
    replication_factor: 2
    config:
      # Scored events are written by the scorer and read by the alert API
      # and dashboard. 24h retention is enough - the alert API persists alerts to a Postgres
      # for longer-term queries.
      retention.ms: "86400000" # 24 hours in milliseconds
      max.message.bytes: "1048576"
      cleanup.policy: "delete"

  - name: alerts
    description: "Alerts generated by the alert API based on scored events."
    replication_factor: 2
    config:
      # Alerts are persisted to Postgres by the alert API. So kafka only
      # needs to hold them long enough for the SSE feed consumers to pick up.
      # 24h is a comfortable buffer.
      retention.ms: "86400000" # 24 hours in milliseconds
      max.message.bytes: "65536" # Alerts are tiny - entity_id + score + timestamp
      cleanup.policy: "delete"
